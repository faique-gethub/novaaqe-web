<!DOCTYPE html>
<html>
<head>
  <base href="/novaaqe-web/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novaaq.E</title>
  <style>
    body { background-color: #0a0a12; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <script>
    const serviceWorkerVersion = "1520085682" /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */;
  </script>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
